name: CI — E2E Tests (Serenity BDD)

# ─────────────────────────────────────────────────────────────────────────────
# Ejecuta las pruebas E2E con Serenity BDD + WebDriverIO contra la app
# PokeVene-MVP cuando se hace push a dev o manualmente.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo de la ejecución manual (opcional)"
        required: false
        default: "Ejecución manual E2E"

concurrency:
  group: ci-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────
  # Fase 1 — Levantar servicios y correr E2E
  # ───────────────────────────────────────────────
  e2e-serenity:
    name: "[ E2E ] Serenity BDD + WebDriver"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pokevene
          POSTGRES_PASSWORD: pokevene_test
          POSTGRES_DB: pokevene_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pokevene"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      CI: "true"
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: pokevene
      DB_PASSWORD: pokevene_test
      DB_NAME: pokevene_test
      JWT_SECRET: e2e-test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --prefer-offline

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci --prefer-offline

      - name: Start backend server
        working-directory: backend
        run: npm start &
        env:
          PORT: "3001"

      - name: Build & serve frontend
        working-directory: frontend
        run: |
          npm run build
          npx serve -s dist -l 5173 &
        env:
          VITE_API_URL: "http://localhost:3001"

      - name: Wait for services
        run: |
          echo "Esperando backend en :3001..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break || sleep 2
          done
          echo "Esperando frontend en :5173..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break || sleep 2
          done

      - name: Run Serenity BDD E2E tests
        id: e2e
        working-directory: e2e
        run: npm test
        env:
          BASE_URL: "http://localhost:5173"
          API_URL: "http://localhost:3001"

      - name: Generate Serenity report
        if: always()
        working-directory: e2e
        run: npm run report || true

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-e2e-report-${{ github.sha }}
          path: e2e/target/site/serenity/
          retention-days: 14
          if-no-files-found: ignore

      - name: Annotate E2E summary
        if: always()
        run: |
          echo "## E2E Results — Serenity BDD + WebDriver" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.e2e.outcome }}" == "success" ]]; then
            echo "**Status:** PASSED" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Status:** FAILED" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Reporte Serenity disponible como artifact: \`serenity-e2e-report-${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
