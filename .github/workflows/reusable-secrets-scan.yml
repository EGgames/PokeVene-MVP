
name: Reusable — Secret Scan (Gitleaks)

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: Gitleaks — Detect Hardcoded Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Notify on detection
        if: failure()
        run: |
          echo "::error::Gitleaks detectó secretos expuestos en el código."
          echo "::error::Revisa el reporte de Gitleaks y rota las credenciales comprometidas."
          echo "::error::Usa variables de entorno o GitHub Secrets para almacenar valores sensibles."
          echo ""
          echo "Recursos:"
          echo "  - GitHub Secrets: https://docs.github.com/en/actions/security-guides/encrypted-secrets"
          echo "  - .gitignore para archivos .env: https://git-scm.com/docs/gitignore"
